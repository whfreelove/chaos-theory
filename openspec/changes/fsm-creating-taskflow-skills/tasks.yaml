validation-enhancement:
  - >-
    In plugins/finite-skill-machine/scripts/hydrate-tasks.py, find the validate_fsm_tasks
    function (line 337). In the first pass section after the subject field check (lines
    361-365), add a description field check following the identical pattern — get
    "description" from task, if None append "Task {i}: missing required field
    'description'" error, elif not isinstance(description, str) append "Task {i}:
    'description' must be a string, got {type(description).__name__}" error
  - >-
    In the hydrate-tasks test file (plugins/finite-skill-machine/tests/test_hydrate_tasks.py
    — or tests/plugins/finite-skill-machine/test_hydrate_tasks.py if fsm-test-infra has
    relocated it), add test cases for description field validation following the existing
    test_missing_subject_fails pattern (line 139): (1) test_missing_description_fails —
    fsm.json entry with id and subject but no description field, assert exit_code != 0 and
    "description" in stderr.lower(), (2) test_non_string_description_fails — fsm.json entry
    with id, subject, and description as integer 42, assert exit_code != 0 and "description"
    in stderr.lower(), (3) test_valid_description_passes — fsm.json entry with id, subject,
    and description as valid string, assert exit_code == 0
  - Run pytest on the hydrate-tasks test file and verify all tests pass including both new and existing tests

skill-directory:
  - Create directory plugins/finite-skill-machine/skills/creating-taskflow-skills/

# Depends on skill-directory completing first (SKILL.md placed in created directory)
skill-md:
  - >-
    Create plugins/finite-skill-machine/skills/creating-taskflow-skills/SKILL.md with YAML
    frontmatter delimited by --- containing name: "creating-taskflow-skills" and description:
    a one-sentence summary of the creating-taskflow-skills skill's purpose (guiding authors through creating skills
    with structured task workflows)
  - >-
    Write the SKILL.md body content describing the workflow phases in author-facing language.
    Cover these phases by purpose, not by internal identifiers: intake (provide an existing
    skill, written steps, or brainstorm from scratch), normalization (review and confirm the
    step list), dependency mapping (define execution order and relationships between tasks),
    description writing (write self-contained task descriptions that stand alone after context
    compaction), documentation generation (produce the delivered skill's documentation file), workflow
    definition finalization (validate and format the structured workflow), and final validation
    (comprehensive cross-cutting checks before deployment). Reference tasks by their purpose,
    not by filenames or internal identifiers

fsm-json:
  - >-
    Create plugins/finite-skill-machine/skills/creating-taskflow-skills/fsm.json as a JSON
    array with 9 entries. Every entry must have 5 core fields — id (integer, sequential
    starting at 1), subject (string), description (string), activeForm (string), blockedBy
    (array of integers) — plus metadata: {"fsm": "creating-taskflow-skills"}. All
    descriptions must be self-contained (no references to "the skill," sibling tasks, or
    assumed context)
  - >-
    Write entry 1 — id: 1, subject: "Analyze existing skill for workflow extraction",
    activeForm: "Analyzing existing skill", blockedBy: []. Description must cover: (a) this
    is one of two parallel input-based intake sources; (b) applicability check — evaluate
    whether the author's input includes an existing skill to transform; if not applicable,
    mark task complete with no output; (c) if applicable: analyze the existing skill's structure and
    extract discrete workflow steps in the order they appear; (d) identify implicit
    parallelism where independent operations have no data dependencies; (e) when the existing skill
    contains conditional logic, present decomposition options to the author — separate tasks
    with the condition in each description, or a single task handling both branches — author
    chooses; (f) present extracted steps for author review — author can confirm, add, remove,
    reorder, or rename; (g) validate at least one step emerges; if zero, mark complete with
    no output. Covers: CMP-intake-existing, workflow-intake:2.1-2.5
  - >-
    Write entry 2 — id: 2, subject: "Evaluate written step descriptions", activeForm:
    "Evaluating written step descriptions", blockedBy: []. Description must cover: (a) this
    is one of two parallel input-based intake sources; (b) applicability check — evaluate
    whether the author's input includes written step-by-step descriptions; if not applicable,
    mark task complete with no output; (c) if applicable: evaluate each description for
    specificity, actionability, and appropriate scope; (d) accept well-structured descriptions
    with at most minor formatting adjustments; (e) prompt for clarification on vague
    descriptions that lack specificity about what work is performed; (f) suggest splitting
    overly broad steps that encompass multiple distinct operations, with specific boundary
    recommendations; (g) validate at least one step emerges; if zero, mark complete with no
    output. Covers: CMP-intake-written, workflow-intake:3.1-3.3
  - >-
    Write entry 3 — id: 3, subject: "Brainstorm to fill workflow gaps", activeForm:
    "Brainstorming to fill workflow gaps", blockedBy: [1, 2]. Description must cover: (a)
    sequential gap-filling step that runs after both input-based intakes complete; (b) review
    the material contributed by the input-based intakes to understand existing coverage; (c)
    if prior intakes produced substantial material: identify gaps or thin areas and brainstorm
    additional steps to fill them, present proposed additions to the author for confirmation;
    (d) if prior intakes produced no material (both completed with no output): guide the
    author through brainstorming a full step list from scratch — organize unordered ideas
    into a logical execution sequence, explain the reasoning behind the proposed order; (e)
    consolidate overlapping ideas that describe the same work into single steps, explain which
    ideas were merged and why; (f) present the proposed step list to the author for
    confirmation — author can approve or request changes; do not advance until the author
    approves; (g) validate at least one step exists from all sources combined; (h) if
    brainstorming yields no usable steps after the author declines to provide ideas and no
    prior intake produced material, acknowledge the author is not ready and suggest returning
    later — terminate the workflow gracefully. Covers: CMP-intake-brainstorm,
    workflow-intake:4.1-4.5
  - >-
    Write entry 4 — id: 4, subject: "Normalize intake into step list", activeForm:
    "Normalizing intake into step list", blockedBy: [3]. Description must cover: (a) fan-in
    convergence point — collect whatever workflow material exists from all intake sources; (b)
    normalize into a consistent numbered list of {label, description} pairs where label is a
    short task name and description summarizes the work performed; (c) concatenate all
    contributions without automatic deduplication — the author resolves duplicates or
    conflicts during the confirmation step since similar labels may serve different purposes;
    (d) ensure every step has a short label and a description of the work it performs; (e)
    present the normalized step list to the author for confirmation — author can add, remove,
    reorder, or rename steps; do not advance until the author approves; (f) validate: at
    least one step, no empty descriptions; if validation fails, present the issue and ask the
    author to correct it, then re-validate before completing. Covers: CMP-normalize,
    workflow-intake:1.2, workflow-validation:1.1, 1.4, 1.6
  - >-
    Write entry 5 — id: 5, subject: "Draft skill documentation", activeForm: "Drafting skill
    documentation", blockedBy: [4]. Description must cover: (a) generate the documentation
    file for the author's new skill — branches off the normalized step list independently;
    (b) produce YAML frontmatter with name (the delivered skill's display name) and description (a
    one-sentence summary) fields; (c) write body content describing workflow steps in terms
    the delivered skill's end user understands — reference tasks by their purpose, not by filenames or
    internal identifiers; (d) validate YAML frontmatter contains name and description
    fields; (e) auto-normalize
    display-friendly skill and plugin names to directory-safe format (lowercase, hyphens, no
    special characters) and present the normalized name to the author for confirmation; (f)
    guide the author on file placement: plugins/<plugin>/skills/<skill>/SKILL.md; (g) create
    the target directory if it does not exist — by this point the author has confirmed the
    skill and plugin names via auto-normalize; (h) detect when the target skill directory
    already exists and contains files — offer the author options to overwrite the existing
    files, choose a different skill name, or abort; do not place files until the author
    selects an option; (i) this task self-validates (frontmatter) and
    completes independently — does not feed into final validation. Covers: CMP-skill-md,
    skill-file-generation:1.1-1.3, 2.1, 3.6, 4.1-4.4
  - >-
    Write entry 6 — id: 6, subject: "Map task dependencies", activeForm: "Mapping task
    dependencies", blockedBy: [4]. Description must cover: (a) guide the author through
    encoding execution relationships between tasks from the normalized step list; (b) serial
    patterns: help express sequential dependencies where one task must complete before the
    next begins; (c) parallel patterns: identify tasks eligible for concurrent execution with
    no mutual dependencies; (d) fan-out (one predecessor, multiple independent successors),
    fan-in (multiple predecessors, one successor), and diamond (fan-out followed by fan-in)
    patterns; (e) present the complete dependency graph for author review — author can modify
    dependencies after review; (f) cycle detection via programmatic tool invocation (a Python
    script) using Kahn's algorithm (BFS-based topological sort) — initialize each
    node's in-degree from the dependency graph, enqueue nodes with in-degree 0, repeatedly
    dequeue a node and decrement dependents' in-degrees, enqueue any that reach 0; if sort
    does not consume all nodes, report unconsumed task IDs and labels as cycle participants;
    (g) support step list modifications during this phase:
    author may add, remove, or rename tasks — removal triggers dangling reference cleanup,
    addition triggers relationship prompting (predecessors and successors), rename preserves
    existing relationships; newly added tasks get next sequential ID (max existing + 1),
    existing IDs remain stable; re-validate after each modification; (h) if validation fails,
    present the issue and ask the author to correct it, then re-validate before completing.
    Covers: CMP-dependency-map, dependency-mapping:1.1-1.3, 2.1-2.2, 3.1-3.4, 4.1-4.4,
    5.1-5.3, workflow-validation:1.2, 1.5, 1.6
  - >-
    Write entry 7 — id: 7, subject: "Write self-contained task descriptions", activeForm:
    "Writing self-contained task descriptions", blockedBy: [6]. Description must cover: (a)
    generate task descriptions from the intake understanding and present drafts to the author
    for approval or editing — the authoring model is "skill generates, author
    approves/edits"; (b) present tasks one at a time in dependency order (topological sort);
    author can skip to a specific task or return to revise a previously completed one; (c)
    each description must include goal (what the task accomplishes), constraints, and expected
    outcome; (d) self-containment checklist on each description: (i) goal statement — what
    the task accomplishes, (ii) specific actions — what the agent should do, (iii) acceptance
    criteria — how to know when done, (iv) no undefined references — every term defined
    within the description or including a pointer to its definition in code or project
    documentation; give the author immediate feedback per-description; (e) detect and flag
    external references ("as described in the skill," "per the instructions above") —
    instruct the author to inline the referenced content; (f) detect and flag inter-task
    references (references to other tasks by name, "the previous task," implicit ordering
    assumptions like "at this point X will already exist") — instruct the author to state
    preconditions explicitly; (g) evaluate task sizing: flag descriptions covering multiple
    objectives (recommend splitting); flag descriptions that cannot meaningfully populate all
    4 checklist items because items become trivially redundant (recommend merging with a
    related task); (h) auto-generate activeForm by deriving present-continuous form from task
    label (e.g., "Validate dependencies" becomes "Validating dependencies"), present to author
    for confirmation/override — accept any author-provided override as-is without format
    validation (present-continuous form is a generation requirement, not an override constraint);
    (i) allow the author to return and revise a previously approved
    description — re-evaluate for self-containment before accepting; (j) validate every task
    has a non-empty, non-placeholder description; if validation fails, present the issue and
    ask the author to correct it, then re-validate before completing. Covers:
    CMP-descriptions, self-contained-descriptions:1.1-1.5, 2.1-2.3, 3.1-3.3, 4.1-4.2,
    workflow-validation:1.3, 1.3.1, 1.3.2, 1.6
  - >-
    Write entry 8 — id: 8, subject: "Finalize task definition", activeForm: "Finalizing task
    definition", blockedBy: [7]. Description must cover: (a) finalize the progressively-built
    workflow definition into a valid JSON array with one entry per workflow task; (b) renumber
    all task IDs to topological order (sequential starting at 1) and update all dependency
    references to match — tie-breaking for same-precedence nodes: retain original authoring
    order for deterministic output; (c) verify each entry contains 5 core fields with correct
    types: id (integer, sequential starting at 1), subject (string, short task title),
    description (string, self-contained instructions), activeForm (string — present-continuous
    form auto-generated, author overrides accepted as-is), blockedBy (array of integers, local
    IDs); (d) verify each
    entry contains metadata (object) with an fsm key whose value is a non-empty string
    matching the delivered skill's name, for scoped identification; (e) other optional fields (owner,
    status, blocks) are omitted — defaults apply at runtime; (f) validate all dependency
    references point to IDs that exist in the same array; (g) guide the author on file
    placement alongside the delivered skill's documentation file. Covers: CMP-fsm-json-finalize,
    skill-file-generation:3.1-3.6, 4.1-4.2
  - >-
    Write entry 9 — id: 9, subject: "Run final validation", activeForm: "Running final
    validation", blockedBy: [8]. Description must cover 4 cross-cutting checks: (a) check 1
    — cycle detection: verify no circular dependencies using Kahn's algorithm (BFS-based
    topological sort); initialize in-degrees from dependency graph, enqueue in-degree-0 nodes,
    repeatedly dequeue and decrement dependents; if sort does not consume all nodes, report
    unconsumed task IDs and labels; (b) check 2 — self-containment audit: re-verify every
    task description against the checklist: (i) goal statement, (ii) specific actions, (iii)
    acceptance criteria, (iv) no undefined references; flag any description that references
    the delivered skill's SKILL.md text, sibling tasks, or assumes context not present in the
    description; when an issue is found, the author corrects it in-place within this task — no
    regression to the description writing phase; re-evaluate corrected descriptions before
    proceeding; (c) check 3 — structural integrity: verify valid JSON array, each entry has
    required fields (id, subject, description, activeForm, blockedBy) with correct types (id:
    integer, subject: string, description: string, activeForm: string, blockedBy: array of
    integers), all IDs unique, all dependency references resolve, metadata present as object
    with fsm key whose value is non-empty string matching the delivered skill's name, file targets correct
    directory (plugins/<plugin>/skills/<skill>/); (d) check 4 — name consistency: verify that
    the metadata.fsm value in fsm.json matches the SKILL.md frontmatter name field; (e)
    present pass/fail results per check with specific issues listed per failure; do not
    finalize until all checks pass. Covers:
    CMP-final-validation, workflow-validation:2.1-2.8, 2.10-2.12, 3.1-3.2
  - >-
    Validate the completed fsm.json: verify valid JSON, exactly 9 entries, IDs sequential
    1-9, all blockedBy references resolve to existing IDs, every entry has metadata with
    fsm: "creating-taskflow-skills"

behavioral-verification:
  - >-
    Set up the behavioral verification environment before running any behavioral tests.
    Concrete setup steps: (1) Ensure the FSM plugin is in the plugins directory —
    verify plugins/finite-skill-machine/ contains plugin.json, hooks/hooks.json, and
    scripts/hydrate-tasks.py and scripts/block-skill-internals.sh. (2) Verify the skill
    is deployed — confirm plugins/finite-skill-machine/skills/creating-taskflow-skills/
    contains both SKILL.md and fsm.json. (3) Start a fresh Claude Code session to ensure
    a clean task directory with no pre-existing tasks. (4) Invoke the skill using
    finite-skill-machine:creating-taskflow-skills to trigger the FSM hook pipeline.
    (5) Verify hydration succeeded — confirm the task directory contains 9 task files.
    If the hook fails, check stderr for validation or resolution errors before proceeding.
  - >-
    Verify workflow-intake behavioral correctness by invoking the delivered skill and
    exercising all intake paths. Provide an existing skill as input and verify extracted
    steps match the existing skill's structure with source-specific guidance. Provide written steps
    of varying quality and verify the delivered skill prompts for clarification or splitting as
    appropriate. Verify brainstorming reviews prior intake material and fills gaps or
    generates from scratch when no prior material exists. Verify the normalization
    confirmation gate blocks progression until the author approves. Confirm that the author
    confirmation gate (AskUserQuestion) is observed during intake — the delivered skill pauses for
    author approval before advancing past each intake step and normalization.
    Rule-level verification checklist:
    [ ] Rule 1 — Input-based sources and brainstorming gap-filling: source-specific guidance presented for each intake type; brainstorming reviews prior material and fills gaps; convergence produces normalized step list.
    [ ] Rule 2 — Existing skill transformation: sequential steps extracted; implicit parallelism identified; conditional logic decomposition options presented; author review gate observed.
    [ ] Rule 3 — Written step description intake: well-structured descriptions accepted; vague descriptions prompt clarification; overly large steps prompt splitting.
    [ ] Rule 4 — Brainstorming gap-filling: gaps identified from prior material; unordered ideas organized when no prior material; overlapping ideas consolidated; author confirmation gate observed; graceful termination when no steps emerge.
  - >-
    Verify dependency-mapping behavioral correctness by invoking the delivered skill and
    exercising dependency encoding. Define a linear workflow and verify blocking
    relationships are encoded correctly. Define independent tasks and verify no blocking
    relationships between them. Define fan-out/fan-in workflows and verify the dependency
    graph captures convergence and divergence. Verify the delivered skill presents a complete
    dependency summary and allows modifications. During dependency mapping, remove a task
    and verify graph updates correctly; add a task and verify the delivered skill prompts for
    blocking relationships with all existing tasks; rename a task and verify existing
    dependencies are preserved. Introduce a circular dependency and verify early cycle
    detection reports the involved tasks before proceeding to description writing. Confirm
    that the author confirmation gate (AskUserQuestion) is observed during dependency
    review — the delivered skill pauses for author approval before finalizing the dependency graph.
    Rule-level verification checklist:
    [ ] Rule 1 — Serial execution patterns: linear chain encoding correct; explicit ordering for ambiguous steps.
    [ ] Rule 2 — Parallel execution patterns: independent tasks identified; parallel grouping confirmed.
    [ ] Rule 3 — Fan-in and fan-out patterns: fan-out from single predecessor; fan-in to single successor; diamond pattern.
    [ ] Rule 4 — Author confirmation of graph: dependency summary presented; modifications after review accepted; approval gate observed.
    [ ] Rule 5 — Step list modifications during dependency mapping: task removal updates graph and removes dangling refs; task addition prompts for new relationships; task rename preserves relationships; re-validation after each modification.
  - >-
    Verify self-contained-descriptions behavioral correctness by invoking the delivered
    skill and exercising description writing. Write descriptions with and without external
    references and verify the delivered skill flags non-self-contained ones. Write descriptions
    referencing sibling tasks and verify each reference type is caught. Write descriptions
    of varying sizes and verify the delivered skill recommends splitting, merging, or accepts as
    appropriate. Verify the self-containment checklist runs on each description during
    writing, providing immediate per-description feedback. Define tasks with labels and
    verify the delivered skill generates activeForm and allows override. Revise an approved
    description and verify re-validation runs. Verify tasks are presented in dependency
    order and the author can skip or return to previous tasks. Confirm that the author
    confirmation gate (AskUserQuestion) is observed during description approval.
    Rule-level verification checklist:
    [ ] Rule 1 — Sole instruction source: self-contained descriptions accepted; missing context flagged; external references caught; revision with re-validation; tasks presented in dependency order with skip/return navigation.
    [ ] Rule 2 — No inter-task references: named task references caught; "the previous task" references caught; implicit ordering assumptions caught.
    [ ] Rule 3 — Appropriate task sizing: overly large descriptions prompt splitting; overly small prompt merging; appropriate size accepted.
    [ ] Rule 4 — activeForm auto-generation: present-continuous form derived from label; author confirmation or override; overrides accepted as-is without format validation.
  - >-
    Verify skill-file-generation behavioral correctness by invoking the delivered skill
    and completing the workflow to produce output files. Verify the generated SKILL.md has
    valid YAML frontmatter with name and description fields and describes steps without
    internal identifiers. Verify all workflow steps are present in the task definition with
    dependencies encoded correctly and required fields per entry. Provide a display-friendly
    name and verify normalization and confirmation prompt. For directory-state scenarios,
    apply scenario-specific setup from infra.md before exercising the scenario: remove the
    target directory to verify creation (4.3), or pre-populate it to verify collision
    detection (4.4). Verify the delivered skill creates the target directory if it does not
    exist. Verify the delivered skill detects an existing directory and offers
    overwrite/rename/abort options. Verify the delivered skill instructs placement at the
    correct path.
    Rule-level verification checklist:
    [ ] Rule 1 — SKILL.md generation: valid YAML frontmatter with name and description; author-facing body language; correct directory placement; self-validation failure triggers correction and re-validation.
    [ ] Rule 2 — Task definition file generation: all workflow steps present; dependencies encoded correctly; required fields per entry; display-friendly names auto-normalized with author confirmation.
    [ ] Rule 3 — Correct directory structure: files placed under plugins/<plugin>/skills/<skill>/; SKILL.md and fsm.json colocated; target directory created if absent; existing directory detected with overwrite/rename/abort options.
  - >-
    Verify workflow-validation behavioral correctness by invoking the delivered skill and
    exercising validation at each phase. Verify each phase gate blocks on invalid input
    and passes on valid input. Verify the self-containment checklist runs on each
    description during writing. Verify placeholder text in a description is caught and
    reported. Skip tasks during description writing and attempt to advance — verify the
    delivered skill reports which tasks have incomplete descriptions and blocks advancement until all
    tasks have descriptions. Complete the workflow and verify final validation reports
    pass/fail per check with specific issues for failures. Verify self-containment failures can be corrected
    in-place without phase regression. Verify structural checks catch missing fields and
    type mismatches. Verify metadata content validation catches empty or wrong-key
    metadata. Verify dangling blockedBy references are caught and reported with
    the specific task entry and invalid reference. Confirm that the author confirmation
    gate (AskUserQuestion) is observed at each phase boundary where approval is required.
    Rule-level verification checklist:
    [ ] Rule 1 — Incremental phase validation: intake output validated (labels, descriptions, minimum steps); dependency mapping validated (all tasks, no dangling refs, no cycles); description writing validated (non-empty, non-placeholder, self-containment checklist per description); placeholder text caught with specific task reported; advancement blocked when skipped tasks have incomplete descriptions.
    [ ] Rule 2 — Comprehensive final validation: self-containment audit with in-place correction; cycle detection; structural integrity (5 core fields + metadata with correct types; missing field caught; wrong type caught; empty fsm value caught; dangling blockedBy reference caught).
    [ ] Rule 3 — Clear validation results: passing validation confirms readiness; failing validation lists specific issues with actionable guidance.

verification:
  - >-
    Run validate_fsm_tasks against the created fsm.json by importing the function from
    hydrate-tasks.py and passing the parsed JSON array — verify zero errors returned
  - >-
    Verify SKILL.md exists at plugins/finite-skill-machine/skills/creating-taskflow-skills/SKILL.md
    and contains valid YAML frontmatter with name and description fields
  - >-
    Verify fsm.json at plugins/finite-skill-machine/skills/creating-taskflow-skills/fsm.json
    is valid JSON, contains exactly 9 entries, and every entry has all 5 core fields (id,
    subject, description, activeForm, blockedBy) plus metadata with fsm key
  - >-
    Verify the fsm.json dependency graph matches the authoritative graph from technical.md:
    entries 1 and 2 have blockedBy: [], entry 3 has blockedBy: [1, 2], entry 4 has
    blockedBy: [3], entries 5 and 6 have blockedBy: [4], entry 7 has blockedBy: [6], entry 8
    has blockedBy: [7], entry 9 has blockedBy: [8]
  - Run the full pytest suite and verify all tests pass with no regressions
