# chaos-theory-lite spec: fsm-session-hook-bypass

# ── FUNCTIONAL ──────────────────────────────────────────────
functional:
  why: >-
    When a developer is denied access to a skill file, the only suggested
    workaround is to disable the entire finite-skill-machine plugin — losing
    automatic task creation and all other FSM functionality just to read one file during
    development. The cost is disproportionate to the need.
  capabilities:
    CAP-session-bypass: >-
      Developer can temporarily allow skill file access for the current shell
      session without disabling the plugin.
    CAP-actionable-denial: >-
      Developer sees how to allow skill file access directly in the denial
      message instead of being told to disable the whole plugin.
  user-impact:
    scope: >-
      Developers working on skill files (SKILL.md, fsm.json, hooks.json) who
      hit the deny wall during plugin or skill development.
    out-of-scope: >-
      Persistent bypass configuration changes. Plugin-level enable/disable.
      Changes to which file patterns are blocked. Individual denial message
      field coverage beyond the primary developer-visible text — deferred to
      a future iteration.
    known-risks: >-
      A developer who sets the bypass env var and forgets may have reduced
      protection for the rest of the session. This is acceptable because
      the access gate is a development guardrail, not a security boundary.
  what-changes:
    CHG-env-bypass:
      description: >-
        Setting a shell environment variable allows skill file access for the
        current session without disabling the plugin.
      type: minor
    CHG-denial-message:
      description: >-
        When skill file access is denied, the message tells the developer how
        to set the bypass environment variable instead of suggesting plugin
        disablement.
      type: patch

# ── REQUIREMENTS ────────────────────────────────────────────
requirements:
  CAP-session-bypass:
    added:
      REQ-env-var-bypass:
        rule: >-
          When FSM_BYPASS is set to a non-empty value, the hook MUST allow
          Read, Glob, and Grep access to skill files without emitting a deny.
        scenarios:
          SCN-bypass-active:
            given:
              - FSM_BYPASS is exported and non-empty in the shell environment
            when:
              - The agent attempts to Read a skill-internal file (SKILL.md)
            then:
              - The hook exits 0 with no JSON output
          SCN-bypass-not-set:
            given:
              - FSM_BYPASS is not present in the shell environment
            when:
              - The agent attempts to Read a skill-internal file (SKILL.md)
            then:
              - The hook emits a deny decision
          SCN-bypass-active-glob:
            given:
              - FSM_BYPASS is exported and non-empty in the shell environment
            when:
              - The agent attempts to Glob a pattern matching a skill-internal file
            then:
              - The hook exits 0 with no JSON output
          SCN-bypass-active-grep:
            given:
              - FSM_BYPASS is exported and non-empty in the shell environment
            when:
              - The agent attempts to Grep with a path targeting a skill-internal file
            then:
              - The hook exits 0 with no JSON output
          SCN-bypass-active-hooks-json:
            given:
              - FSM_BYPASS is exported and non-empty in the shell environment
            when:
              - The agent attempts to Read a skill-internal file (hooks.json)
            then:
              - The hook exits 0 with no JSON output
          SCN-bypass-active-fsm-json:
            given:
              - FSM_BYPASS is exported and non-empty in the shell environment
            when:
              - The agent attempts to Read a skill-internal file (fsm.json)
            then:
              - The hook exits 0 with no JSON output
          SCN-bypass-empty-string:
            given:
              - FSM_BYPASS is exported as an empty string
            when:
              - The agent attempts to Read a skill-internal file (SKILL.md)
            then:
              - The hook emits a deny decision
          SCN-denial-grep:
            given:
              - FSM_BYPASS is not present in the shell environment
            when:
              - The agent attempts to Grep with a path targeting a skill-internal file
            then:
              - The hook emits a deny decision
  CAP-actionable-denial:
    added:
      REQ-updated-denial-message:
        rule: >-
          The denial message MUST tell the user to export FSM_BYPASS=1
          to allow skill file access for the session. The denial message
          MUST NOT contain advice to disable the plugin.
        scenarios:
          SCN-denial-contains-bypass-instructions:
            given:
              - FSM_BYPASS is not present in the shell environment
            when:
              - The agent attempts to Glob a skill-internal file (fsm.json)
            then:
              - The hook emits a deny decision
              - The denial message contains "export FSM_BYPASS=1"
          SCN-denial-removes-plugin-advice:
            given:
              - FSM_BYPASS is not present in the shell environment
            when:
              - The agent attempts to Glob a skill-internal file (fsm.json)
            then:
              - The hook emits a deny decision
              - The denial message does not contain "Disable finite-skill-machine"

# ── TECHNICAL ───────────────────────────────────────────────
technical:
  context: >-
    block-skill-internals.sh is a PreToolUse hook that runs on every Read, Glob,
    and Grep invocation. It pattern-matches the tool input path against SKILL.md,
    fsm.json, and hooks.json. The hook receives tool input as JSON on stdin and
    outputs a deny JSON object to block access. Claude Code hooks execute as child
    processes following the standard Unix subprocess model, where environment
    variables are inherited by default. The hook's stdin/stdout communication
    confirms standard subprocess behavior.
  objectives:
    OBJ-session-bypass: >-
      Developer can allow skill file access for a shell session using only an
      environment variable — no files, config changes, or persistent state.
    OBJ-self-contained: >-
      The bypass is fully implemented within the existing hook script with no
      new files, dependencies, or plugin configuration changes.
  architecture:
    system-overview: |
      graph LR
        A[Agent: Read/Glob/Grep] --> B[block-skill-internals.sh]
        B -->|FSM_BYPASS non-empty| C[Allow: exit 0, no output]
        B -->|FSM_BYPASS empty or unset| D{Path matches?}
        D -->|yes| E[Deny with bypass instructions]
        D -->|no| F[Allow: exit 0, no output]
    component-interactions: null
  components:
    CMP-block-skill-internals:
      description: >-
        Shell script hook that gates agent access to skill internals.
      responsibilities:
        - Check FSM_BYPASS env var non-empty early-exit
        - Determine tool type via tool_input key presence (not tool_name) and extract the target path from the matched field (file_path for Read, pattern for Glob, path for Grep); pattern-match against protected file names
        - Emit deny JSON with hookSpecificOutput wrapper and actionable bypass instructions in systemMessage
      dependencies: []
  interfaces:
    INT-deny-response:
      description: >-
        JSON object emitted to stdout when the hook denies access to a
        skill-internal file.
      fields:
        systemMessage: >-
          Developer-visible text explaining the denial and how to set
          FSM_BYPASS=1 to allow access for the session. MUST contain
          "export FSM_BYPASS=1". MUST NOT contain "Disable finite-skill-machine".
        hookSpecificOutput.hookEventName: >-
          Always "PreToolUse". Identifies the hook event type.
        hookSpecificOutput.permissionDecision: >-
          Always "deny". Signals to Claude Code that the tool use is blocked.
        hookSpecificOutput.permissionDecisionReason: >-
          Brief denial reason referencing the bypass mechanism rather than
          plugin disablement.
      example: |
        {
          "systemMessage": "Access to skill internals is blocked. To allow access for this session, run: export FSM_BYPASS=1",
          "hookSpecificOutput": {
            "hookEventName": "PreToolUse",
            "permissionDecision": "deny",
            "permissionDecisionReason": "Skill-internal file is protected. Set FSM_BYPASS=1 to bypass."
          }
        }
  decisions:
    DEC-env-var-over-file-flag: >-
      In the context of the skill-internals access gate, facing the need for a
      session-scoped bypass that requires no setup or cleanup, we decided on a
      shell environment variable (FSM_BYPASS) and neglected a temporary file
      flag and a plugin config flag, to achieve zero-configuration bypass that
      is session-scoped by default and follows standard shell conventions,
      accepting that the bypass is inherited by child processes and that
      environment inspection is the only discovery method.
    DEC-null-component-interactions: >-
      In the context of a single-component change with no inter-component
      interactions, facing the ambiguity of an empty schema-expected key, we
      decided to leave component-interactions null rather than removing the
      key, to preserve schema compliance while signaling deliberate omission,
      accepting that the null value may appear ambiguous to future readers
      without the YAML comment above the integration key explaining why
      cross-capability scenarios are unnecessary.
  risks:
    RSK-forgotten-bypass:
      risk: >-
        Developer exports FSM_BYPASS and forgets, leaving the hook bypassed for
        the rest of the shell session.
      mitigation: >-
        The hook is a development guardrail, not a security boundary. Session
        scope naturally limits blast radius. The env var name is explicit enough
        to be noticeable in env inspection.

# ── INFRA ───────────────────────────────────────────────────
infra:
  context: >-
    No deployment infrastructure. This is a local Claude Code plugin hook script
    that runs in the developer's shell.
  objectives:
    OBJ-no-infra-changes: >-
      No infrastructure changes required — this is a shell script edit.
  deployment:
    environments: {}
    feature-flags: null
    rollout-strategy: null
  testing-strategy:
    coverage-mapping:
      SCN-bypass-active: manual
      SCN-bypass-not-set: manual
      SCN-bypass-active-glob: manual
      SCN-bypass-active-grep: manual
      SCN-bypass-active-hooks-json: manual
      SCN-bypass-active-fsm-json: manual
      SCN-bypass-empty-string: manual
      SCN-denial-grep: manual
      SCN-denial-contains-bypass-instructions: manual
      SCN-denial-removes-plugin-advice: manual
    manual-test-procedure: |
      Invoke plugins/finite-skill-machine/scripts/block-skill-internals.sh
      directly with fabricated JSON payloads via stdin. For bypass scenarios,
      export FSM_BYPASS=1 before invocation. For denial scenarios, use
      unset FSM_BYPASS (when FSM_BYPASS must not be present) or
      export FSM_BYPASS="" (when testing empty-string behavior) before
      invocation.

      Note: The hook script routes via tool_input key presence (file_path,
      pattern, or path), not via tool_name. The tool_name field is included
      in payloads for production fidelity, not as a routing key.

      Per-scenario payloads:
        SCN-bypass-active (Read SKILL.md):
          {"tool_name": "Read", "tool_input": {"file_path": "/path/to/skills/SKILL.md"}}
        SCN-bypass-not-set (Read SKILL.md):
          {"tool_name": "Read", "tool_input": {"file_path": "/path/to/skills/SKILL.md"}}
        SCN-bypass-active-glob (Glob skill-internal):
          {"tool_name": "Glob", "tool_input": {"pattern": "**/SKILL.md"}}
        SCN-bypass-active-grep (Grep skill-internal):
          {"tool_name": "Grep", "tool_input": {"pattern": "some_regex", "path": "/path/to/skills/SKILL.md"}}
        SCN-bypass-active-hooks-json (Read hooks.json):
          {"tool_name": "Read", "tool_input": {"file_path": "/path/to/skills/hooks.json"}}
        SCN-bypass-active-fsm-json (Read fsm.json):
          {"tool_name": "Read", "tool_input": {"file_path": "/path/to/skills/fsm.json"}}
        SCN-bypass-empty-string (Read SKILL.md):
          {"tool_name": "Read", "tool_input": {"file_path": "/path/to/skills/SKILL.md"}}
        SCN-denial-grep (Grep skill-internal):
          {"tool_name": "Grep", "tool_input": {"pattern": "some_regex", "path": "/path/to/skills/SKILL.md"}}
        SCN-denial-contains-bypass-instructions (Glob fsm.json):
          {"tool_name": "Glob", "tool_input": {"pattern": "**/fsm.json"}}
        SCN-denial-removes-plugin-advice (Glob fsm.json):
          {"tool_name": "Glob", "tool_input": {"pattern": "**/fsm.json"}}

      Verify bypass: hook exits 0 with empty stdout. Verify denial: hook
      exits 0 and stdout contains a JSON object with "systemMessage" and
      "hookSpecificOutput" fields; hookSpecificOutput contains
      "hookEventName" (value "PreToolUse"), "permissionDecision"
      (value "deny"), and "permissionDecisionReason"; use
      jq '.hookSpecificOutput.permissionDecision' and '.systemMessage'
      for inspection.
  observability:
    logging: {}
    metrics: {}
    alerts: {}
  migration: null

# ── INTEGRATION ─────────────────────────────────────────────
# Intentionally empty: cross-capability interaction is already covered by
# single-capability scenarios. Dedicated denial message content scenarios
# (SCN-denial-contains-bypass-instructions, SCN-denial-removes-plugin-advice)
# exercise the full deny path independently. The two capabilities modify the
# same script in non-conflicting ways (early-exit guard + message text) with
# no emergent behavior from their combination.
integration: {}

# ── TASKS ───────────────────────────────────────────────────
tasks:
  hook-script:
    - id: TSK-add-bypass-guard
      description: >-
        Add FSM_BYPASS env var check at top of block-skill-internals.sh that
        exits 0 immediately when set and non-empty.
    - id: TSK-update-denial-message
      description: >-
        Update systemMessage with developer-facing bypass instructions per
        INT-deny-response content constraints (MUST contain "export FSM_BYPASS=1",
        MUST NOT contain "Disable finite-skill-machine"). Update
        permissionDecisionReason with a brief denial reason referencing the
        bypass mechanism.
  verification:
    - id: TSK-verify-bypass
      description: |
        Verify all requirement scenarios using fabricated JSON payloads via
        stdin per the manual test procedure in infra testing-strategy.

        For all scenarios that emit deny JSON, verify: hook exits 0, stdout
        is a JSON object containing systemMessage and hookSpecificOutput
        fields; hookSpecificOutput contains hookEventName, permissionDecision,
        and permissionDecisionReason; hookSpecificOutput.hookEventName equals
        "PreToolUse"; hookSpecificOutput.permissionDecision equals "deny".

        Bypass scenarios (export FSM_BYPASS=1 before each):
          1. SCN-bypass-active: Read SKILL.md — exits 0, empty stdout
          2. SCN-bypass-active-glob: Glob **/SKILL.md — exits 0, empty stdout
          3. SCN-bypass-active-grep: Grep with path to SKILL.md — exits 0, empty stdout
          4. SCN-bypass-active-hooks-json: Read hooks.json — exits 0, empty stdout
          5. SCN-bypass-active-fsm-json: Read fsm.json — exits 0, empty stdout

        Denial scenarios:
          6. SCN-bypass-not-set: unset FSM_BYPASS, then Read SKILL.md — deny JSON emitted
          7. SCN-bypass-empty-string: export FSM_BYPASS="", then Read SKILL.md —
             deny JSON emitted
          8. SCN-denial-grep: unset FSM_BYPASS, then Grep with path to SKILL.md — deny JSON emitted

        Denial message content scenarios (unset FSM_BYPASS before each):
          9. SCN-denial-contains-bypass-instructions: Glob **/fsm.json — deny
             JSON emitted, denial message contains "export FSM_BYPASS=1"
          10. SCN-denial-removes-plugin-advice: Glob **/fsm.json — deny JSON
              emitted, denial message does not contain "Disable
              finite-skill-machine"
